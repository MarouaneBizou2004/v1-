version: '3.9'

services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
  backend:
    build:
      context: ../app/backend
    command: npm run dev
    environment:
      - PORT=4000
      - MONGODB_URI=mongodb://mongo:27017/mastermycity
      - JWT_SECRET=super-secret-key
      - CLIENT_ORIGIN=http://localhost:5173
    ports:
      - '4000:4000'
    depends_on:
      - mongo
  frontend:
    build:
      context: ../app/frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      - VITE_API_BASE_URL=http://localhost:4000
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  mongo-data:
